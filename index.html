<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaneo Automático</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Escaneo Automático</h1>
        <div class="form-group">
            <label for="sucursal">Sucursal:</label>
            <select id="sucursal">
                <option value="618">Terminal Alameda</option>
                <option value="619">Terminal Pajaritos</option>
                <option value="620">Los Andes</option>
                <option value="622">Terminal Valparaíso</option>
                <option value="627">Terminal Viña del Mar</option>
            </select>
        </div>
        <div class="form-group">
            <label for="cuaId">Número de Arqueo:</label>
            <input type="text" id="cuaId" placeholder="Ingrese el número de arqueo">
            <button id="consultarArqueo">Consultar</button>
        </div>
        <div id="resultados"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
