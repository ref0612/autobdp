<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaneo Automático</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <p class="header-label">Sistema de arqueos</p>
            <h1>Escaneo Automático</h1>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="sucursal">Sucursal</label>
                <select id="sucursal">
                    <option value="618">Terminal Alameda</option>
                    <option value="619">Terminal Pajaritos</option>
                    <option value="620">Los Andes</option>
                    <option value="622">Terminal Valparaíso</option>
                    <option value="627">Terminal Viña del Mar</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cuaId">N° Arqueo</label>
                <input type="text" id="cuaId" placeholder="Ej: 55222">
                <button id="consultarArqueo" class="btn-primary">Consultar</button>
            </div>
        </div>

        <div id="resultados"></div>

        <div id="seccionEntregar" class="hidden">
            <div class="divider"></div>
            <div class="entregar-row">
                <button id="btnEntregar" class="btn-entregar" disabled>📦 Entregar Arqueo</button>
                <p id="statusEntregar" class="entregar-status"></p>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
